    - data:
        code: "function extractStructured(value) {\n  if (value === null || value === undefined) {\n    return {};\n  }\n\
          \  if (typeof value === 'object') {\n    return value;\n  }\n  if (typeof value === 'string') {\n    try {\n   \
          \   return JSON.parse(value);\n    } catch (error) {\n      return {};\n    }\n  }\n  return {};\n}\n\nfunction\
          \ normalizeSize(planned, requested) {\n  const raw = String(requested || planned || '').trim().toLowerCase();\n\
          \  const map = {\n    'auto': '2560x1440',\n    '16:9': '2560x1440',\n    'landscape': '2560x1440',\n    '9:16':\
          \ '1440x2560',\n    'portrait': '1440x2560',\n    '1:1': '2048x2048',\n    'square': '2048x2048',\n    '4:3': '2048x1536',\n\
          \    '3:4': '1536x2048'\n  };\n  if (map[raw]) {\n    return map[raw];\n  }\n  if (/^\\d{3,4}x\\d{3,4}$/.test(raw))\
          \ {\n    return raw;\n  }\n  return '2560x1440';\n}\n\nfunction normalizeImageCount(value) {\n  const parsed = Number(value\
          \ || 1);\n  if (!Number.isFinite(parsed)) {\n    return 1;\n  }\n  return Math.max(1, Math.min(4, Math.round(parsed)));\n\
          }\n\nfunction main({planned_image_prompt, planned_size, planned_max_images, planned_style_summary, planned_quality_checklist,\
          \ planned_risk_notes, edit_brief, output_use, aspect_size, image_count}) {\n  const data = {\n    image_prompt:\
          \ planned_image_prompt,\n    size: planned_size,\n    max_images: planned_max_images,\n    style_summary: planned_style_summary,\n\
          \    quality_checklist: planned_quality_checklist,\n    risk_notes: planned_risk_notes\n  };\n  const issues = [];\n\
          \  let prompt = String(data.image_prompt || '').trim();\n  if (!prompt) {\n    const brief = String(edit_brief ||\
          \ output_use || '图片编辑需求').trim();\n    prompt = [\n      '根据参考图进行高质量图片编辑。',\n      '编辑目标：' + brief.slice(0, 600),\n\
          \      '要求：保留主体识别度，提升质感，风格统一，画面干净，无文字水印。'\n    ].join('\\n');\n    issues.push('planner_image_prompt_missing_used_fallback');\n\
          \  }\n\n  const size = normalizeSize(data.size, aspect_size);\n  const maxImages = normalizeImageCount(image_count\
          \ || data.max_images);\n  const diagnostics = {\n    status: issues.length ? 'fallback' : 'success',\n    issues,\n\
          \    selected_model: 'jimeng-seedream-4.5-img2img',\n    selected_model_name: '即梦 SeedDream 4.5 图生图',\n    selected_model_note:\
          \ 'AI Hub direct image-generation 图生图 component model_info.model_id uses the canvas selector id jimeng-seedream-4.5-img2img;\
          \ LLM nodes use detail-card 模型版本 strings separately',\n    output_use: String(output_use || ''),\n    source_brief_length:\
          \ String(edit_brief || '').length,\n    size,\n    max_images: maxImages,\n    style_summary: data.style_summary\
          \ || '',\n    quality_checklist: data.quality_checklist || '',\n    risk_notes: data.risk_notes || ''\n  };\n\n\
          \  return {\n    image_prompt: prompt,\n    size,\n    max_images: maxImages,\n    quality_checklist: String(data.quality_checklist\
          \ || ''),\n    diagnostics: JSON.stringify(diagnostics, null, 2)\n  };\n}\n"
        code_language: javascript
        desc: 规范 SeedDream 图生图参数，校验提示词、尺寸、数量和诊断信息。
