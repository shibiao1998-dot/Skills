          completion_params:
            json_schema: "{\n  \"type\": \"object\",\n  \"properties\": {\n    \"image_prompt\": {\n      \"type\": \"string\"\
              ,\n      \"description\": \"传给图生图组件的完整提示词，说明保留参考图哪些元素、修改哪些元素、目标构图、风格、文字要求和排除项\"\n    },\n    \"size\": {\n \
              \     \"type\": \"string\",\n      \"enum\": [\"auto\", \"2560x1440\", \"1440x2560\", \"2048x2048\", \"2048x1536\"\
              , \"1536x2048\", \"1280x800\"],\n      \"description\": \"图生图输出尺寸\"\n    },\n    \"max_images\": {\n      \"\
              type\": \"number\",\n      \"description\": \"生成数量，建议 1 到 4\"\n    },\n    \"style_summary\": {\n      \"type\"\
              : \"string\",\n      \"description\": \"目标视觉风格摘要\"\n    },\n    \"quality_checklist\": {\n      \"type\": \"\
              string\",\n      \"description\": \"判断改图结果是否合格的检查清单\"\n    },\n    \"risk_notes\": {\n      \"type\": \"string\"\
              ,\n      \"description\": \"参考图质量、文字、人物或构图可能带来的效果风险\"\n    }\n  },\n  \"required\": [\n    \"image_prompt\"\
              ,\n    \"size\",\n    \"max_images\",\n    \"style_summary\",\n    \"quality_checklist\",\n    \"risk_notes\"\
              \n  ],\n  \"additionalProperties\": false\n}\n"
            max_completion_tokens: 4096
            response_format: json_schema
            temperature: 0.3
          mode: chat
          name: gpt-5.5-2026-04-24
          provider: aict/ai_hub/ai_hub
        prompt_template:
        - id: system-prompt
          role: system
          text: '你是资深视觉设计总监、课程封面设计师和 SeedDream 图生图提示词工程师。


            你的任务是把用户的参考图改图需求转成可以直接传给 AI Hub `image-generation` 图生图组件的高质量参数。输出必须严格符合 JSON Schema。


            质量要求：

            - reference_image 是上游 Dify File 变量，会由图生图组件直接读取；你不要声称已经看见图片细节，只根据用户文本要求编写改图指令。

            - image_prompt 必须明确“参考图作为主要视觉依据”，并说明保留哪些结构、修改哪些元素、目标风格、构图、光线、色彩、材质、用途和禁忌。

            - 如果用户要求封面或海报，必须补齐标题区、主体区、留白、可读性和画幅适配要求。

            - 如果用户要求画面中文字，必须清楚写出文字内容、排版层级和可读性要求；不要使用百分比描述版面。

            - 避免版权 IP、具体在世人物肖像替换、过度磨皮、怪异手部或容易破坏参考图主体身份的一次性大改。

            - 不要输出解释文本，只输出 JSON Schema 对应字段。

            '
        - id: user-prompt
          role: user
          text: '请基于以下输入生成参考图改图参数。


            【改图需求】

            {{#start.edit_brief#}}


            【用户显式参数】

            - 用途：{{#start.output_use#}}；如果为空，请从改图需求中判断。

            - 视觉风格：{{#start.visual_style#}}；如果为空，请选择最适合目标用途的高质量风格。

            - 画幅/尺寸：{{#start.aspect_size#}}；如果为空或 auto，请根据用途判断。

            - 画面文字：{{#start.text_elements#}}；如果为空，默认不新增文字。

            - 生成数量：{{#start.image_count#}}；如果为空，默认 1。


            输出 JSON Schema 字段说明：

            - image_prompt：传给 SeedDream 图生图组件的最终提示词。

            - size：根据用途选择 auto、2560x1440、1440x2560、2048x2048、2048x1536、1536x2048 或 1280x800。

            - quality_checklist：用于人工或下游节点判断图片是否合格。

            '
        structured_output:
