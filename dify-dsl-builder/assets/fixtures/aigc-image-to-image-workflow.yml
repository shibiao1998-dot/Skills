    - data:
        code: "function toArray(value) {\n  if (Array.isArray(value)) {\n    return value;\n  }\n  if (value === null || value\
          \ === undefined || value === '') {\n    return [];\n  }\n  return [value];\n}\n\nfunction imageUrl(item) {\n  if\
          \ (typeof item === 'string') {\n    return item.trim();\n  }\n  if (!item || typeof item !== 'object') {\n    return\
          \ '';\n  }\n  return String(item.remote_url || item.url || item.download_url || item.image_url || item.preview_url\
          \ || '').trim();\n}\n\nfunction main({images, image_prompt, size, diagnostics, quality_checklist}) {\n  const allImages\
          \ = toArray(images);\n  const urls = allImages.map(imageUrl).filter(Boolean);\n  if (!urls.length) {\n    throw\
          \ new Error('image-generation 图生图 returned no usable image_url');\n  }\n\n  const imagePackage = {\n    image_url:\
          \ urls[0],\n    image_urls: urls,\n    size,\n    image_prompt,\n    quality_checklist,\n    diagnostics_json: diagnostics\n\
          \  };\n\n  return {\n    image_url: urls[0],\n    image_urls_json: JSON.stringify(urls, null, 2),\n    status: 'success',\n\
          \    message: 'Image edited by AI Hub image-generation component with 即梦 SeedDream 4.5 图生图',\n    images_json: JSON.stringify(allImages,\
          \ null, 2),\n    image_package_json: JSON.stringify(imagePackage, null, 2),\n    raw_response_json: JSON.stringify({images:\
          \ allImages}, null, 2)\n  };\n}\n"
