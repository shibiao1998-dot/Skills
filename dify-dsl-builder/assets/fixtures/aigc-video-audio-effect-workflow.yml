        document:
          configs:
            variable_selector: []
          enabled: false
        model:
          completion_params:
            json_schema: "{\n  \"type\": \"object\",\n  \"properties\": {\n    \"sound_effect_prompt\": {\n      \"type\": \"string\",\n      \"description\": \"音效提示词，描述需要与视频动作同步的环境声、动作声、转场声和细节音效\"\n    },\n    \"bgm_prompt\": {\n      \"type\": \"string\",\n      \"description\": \"配乐提示词，描述音乐情绪、节奏、配器、强弱变化和不应盖过画面声音的要求\"\n    },\n    \"asmr_mode\": {\n      \"type\": \"string\",\n      \"enum\": [\"true\", \"false\"],\n      \"description\": \"是否启用 ASMR 模式，必须输出字符串 true 或 false\"\n    },\n    \"mixing_notes\": {\n      \"type\": \"string\",\n      \"description\": \"音效与配乐混音建议，说明主次、音量和节奏关系\"\n    },\n    \"quality_checklist\": {\n      \"type\": \"string\",\n      \"description\": \"用于判断视频音效/配乐是否合格的检查清单\"\n    }\n  },\n  \"required\": [\n    \"sound_effect_prompt\",\n    \"bgm_prompt\",\n    \"asmr_mode\",\n    \"mixing_notes\",\n    \"quality_checklist\"\n  ],\n  \"additionalProperties\": false\n}\n"
            max_completion_tokens: 2048
            response_format: json_schema
            temperature: 0.3
          mode: chat
          name: gpt-5.5-2026-04-24
          provider: aict/ai_hub/ai_hub
        prompt_template:
        - id: system-prompt
          role: system
          text: '你是资深声音设计师、影视声音剪辑师和 K-V2A 视频生音效提示词工程师。


            你的任务是把用户的视频声音需求转成可以直接传给 AI Hub 可灵 K-V2A 的高质量参数。输出必须严格符合 JSON Schema。


            质量要求：

            - 音效提示词要描述画面动作对应的同步声、环境声、细节声和转场声。

            - 配乐提示词要描述情绪、节奏、配器、段落起伏和不抢对白/主体音效的混音约束。

            - 如果用户强调沉浸、近距离细节、轻声、触感或环境微声，可以启用 ASMR；否则默认关闭。

            - 不要写无法从视频画面推断的台词内容，不要加入版权曲名、艺人名或品牌音乐风格。

            - 不要输出解释文本，只输出 JSON Schema 对应字段。

            '
        - id: user-prompt
          role: user
          text: '请基于以下输入生成视频生音效/BGM 参数。


            【视频 URL】

            {{#start.video_url#}}


            【声音目标】

            {{#start.audio_goal#}}


            【用户显式参数】

            - 音效方向：{{#start.sound_effect_direction#}}；如果为空，请根据声音目标设计。

            - 配乐方向：{{#start.bgm_direction#}}；如果为空，请生成与视频用途匹配的背景音乐描述。

            - ASMR 模式：{{#start.asmr_mode#}}；auto 时根据声音目标判断。


            输出 JSON Schema 字段说明：

            - sound_effect_prompt：传给 K-V2A 的音效提示词。

            - bgm_prompt：传给 K-V2A 的配乐提示词。

            - asmr_mode：字符串 true 或 false。

            - quality_checklist：用于判断生成音频是否合格。

            '
        structured_output:
          schema:
            type: object
            properties:
              sound_effect_prompt:
                type: string
                description: 音效提示词，描述需要与视频动作同步的环境声、动作声、转场声和细节音效
              bgm_prompt:
                type: string
                description: 配乐提示词，描述音乐情绪、节奏、配器、强弱变化和不应盖过画面声音的要求
