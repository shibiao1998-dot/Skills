    - data:
        code: "function toArray(value) {\n  if (Array.isArray(value)) {\n    return value;\n  }\n  if (value === null || value === undefined || value === '') {\n    return [];\n  }\n  return [value];\n}\n\nfunction firstAudio(items) {\n  for (const item of items) {\n    if (typeof item === 'string' && item.trim()) {\n      return {audio_url: item.trim()};\n    }\n    if (item && typeof item === 'object') {\n      const audioUrl = item.remote_url || item.url || item.download_url || item.audio_url || item.preview_url || '';\n      if (String(audioUrl).trim()) {\n        return {\n          audio_url: String(audioUrl).trim(),\n          duration: String(item.duration || item.audio_duration || ''),\n          mime_type: String(item.mime_type || item.content_type || '')\n        };\n      }\n    }\n  }\n  return {audio_url: ''};\n}\n\nfunction main({audios, video_url, sound_effect_prompt, bgm_prompt, asmr_mode, diagnostics, quality_checklist}) {\n  const allAudios = toArray(audios);\n  const\
          \ audio = firstAudio(allAudios);\n  if (!audio.audio_url) {\n    throw new Error('audio-generation returned no usable audio_url for video audio effect');\n  }\n\n  const videoAudioPackage = {\n    audio_url: audio.audio_url,\n    duration: audio.duration || '',\n    mime_type: audio.mime_type || 'audio/mpeg',\n    source_video_url: video_url,\n    sound_effect_prompt,\n    bgm_prompt,\n    asmr_mode,\n    quality_checklist,\n    diagnostics_json: diagnostics\n  };\n\n  return {\n    audio_url: audio.audio_url,\n    status: 'success',\n    message: 'Video audio generated by AI Hub audio-generation component with Kling K-V2A',\n    duration: audio.duration || '',\n    mime_type: videoAudioPackage.mime_type,\n    video_audio_package_json: JSON.stringify(videoAudioPackage, null, 2),\n    raw_response_json: JSON.stringify({audios: allAudios}, null, 2)\n  };\n}\n"
