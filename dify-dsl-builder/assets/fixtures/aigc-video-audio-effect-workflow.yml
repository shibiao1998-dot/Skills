                description: 音效与配乐混音建议，说明主次、音量和节奏关系
              quality_checklist:
                type: string
                description: 用于判断视频音效/配乐是否合格的检查清单
            required:
            - sound_effect_prompt
            - bgm_prompt
            - asmr_mode
            - mixing_notes
            - quality_checklist
            additionalProperties: false
