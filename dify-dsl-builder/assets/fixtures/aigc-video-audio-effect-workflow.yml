    - data:
        code: "function extractStructured(value) {\n  if (value === null || value === undefined) {\n    return {};\n  }\n  if (typeof value === 'object') {\n    return value;\n  }\n  if (typeof value === 'string') {\n    try {\n      return JSON.parse(value);\n    } catch (error) {\n      return {};\n    }\n  }\n  return {};\n}\n\nfunction normalizeAsmrMode(planned, requested, audioGoal) {\n  const raw = String(requested || '').trim().toLowerCase();\n  if (raw === 'true' || raw === 'false') {\n    return raw;\n  }\n  const plan = String(planned || '').trim().toLowerCase();\n  if (plan === 'true' || plan === 'false') {\n    return plan;\n  }\n  const goal = String(audioGoal || '').toLowerCase();\n  return /asmr|沉浸|近距离|轻声|耳语|触感|细节音/.test(goal) ? 'true' : 'false';\n}\n\nfunction main({planned_sound_effect_prompt, planned_bgm_prompt, planned_asmr_mode, planned_mixing_notes, planned_quality_checklist, video_url, audio_goal, sound_effect_direction, bgm_direction, asmr_mode}) {\n  const data =\
          \ {\n    sound_effect_prompt: planned_sound_effect_prompt,\n    bgm_prompt: planned_bgm_prompt,\n    asmr_mode: planned_asmr_mode,\n    mixing_notes: planned_mixing_notes,\n    quality_checklist: planned_quality_checklist\n  };\n  const url = String(video_url || '').trim();\n  if (!url) {\n    throw new Error('video_url is required');\n  }\n  const lowerUrl = url.toLowerCase();\n  if (!lowerUrl.startsWith('http://') && !lowerUrl.startsWith('https://')) {\n    throw new Error('video_url must be an http(s) URL that AI Hub can fetch');\n  }\n\n  const soundEffectPrompt = String(sound_effect_direction || data.sound_effect_prompt || '').trim();\n  const bgmPrompt = String(bgm_direction || data.bgm_prompt || '').trim();\n  if (!soundEffectPrompt && !bgmPrompt) {\n    throw new Error('sound_effect_prompt or bgm_prompt is required');\n  }\n\n  const normalizedAsmr = normalizeAsmrMode(data.asmr_mode, asmr_mode, audio_goal);\n  const diagnostics = {\n    selected_model: 'kling-v2a',\n  \
          \  selected_model_note: 'AI Hub direct AIGC component model_info.model_id uses selector id kling-v2a',\n    video_input_type: 'url',\n    asmr_mode: normalizedAsmr,\n    mixing_notes: data.mixing_notes || '',\n    quality_checklist: data.quality_checklist || ''\n  };\n\n  return {\n    video_input_type: 'url',\n    video_url: url,\n    sound_effect_prompt: soundEffectPrompt,\n    bgm_prompt: bgmPrompt,\n    asmr_mode: normalizedAsmr,\n    quality_checklist: String(data.quality_checklist || ''),\n    diagnostics: JSON.stringify(diagnostics, null, 2)\n  };\n}\n"
        code_language: javascript
        desc: 校验视频 URL，规范音效提示词、配乐提示词、ASMR 模式和诊断信息。
