              value_type: string
              variable: audio_url
            - value_selector:
                - start
                - audio_format
              value_type: string
              variable: audio_format
            - value_selector:
                - start
                - language
              value_type: string
              variable: language
        height: 224
        id: normalize_asr_request
        position:
          x: 390
          y: 260
        positionAbsolute:
          x: 390
          y: 260
        selected: false
