      - data:
          code: |
            function normalizeAudioFormat(value, audioUrl) {
              const raw = String(value || '').trim().toLowerCase();
              const allowed = new Set(['mp3', 'wav', 'm4a', 'aac', 'flac', 'ogg']);
              if (allowed.has(raw)) {
                return raw;
              }
              const match = String(audioUrl || '').toLowerCase().match(/\\.([a-z0-9]+)(?:\\?|#|$)/);
              if (match && allowed.has(match[1])) {
                return match[1];
              }
              return 'mp3';
            }

            function normalizeLanguage(value) {
              const raw = String(value || '').trim().toLowerCase();
              const map = {
                'auto': 'auto',
                'zh': 'zh',
                'cn': 'zh',
                'zh-cn': 'zh',
                'en': 'en',
                'ja': 'ja',
                'jp': 'ja',
                'ko': 'ko',
                'yue': 'yue',
                'cantonese': 'yue',
                'minnan': 'minnan',
                'sh': 'sh',
                'sichuan': 'sichuan',
                'shaanxi': 'shaanxi',
                'es': 'es',
                'pt': 'pt',
                'de': 'de',
                'fr': 'fr',
                'th': 'th',
                'ar': 'ar'
              };
              return map[raw] || 'auto';
            }

            function main({audio_url, audio_format, language}) {
              const url = String(audio_url || '').trim();
              if (!url) {
                throw new Error('audio_url is required');
              }
              const lowerUrl = url.toLowerCase();
              if (!lowerUrl.startsWith('http://') && !lowerUrl.startsWith('https://')) {
                throw new Error('audio_url must be an http(s) URL that AI Hub can fetch');
              }

              const format = normalizeAudioFormat(audio_format, url);
              const normalizedLanguage = normalizeLanguage(language);
              const diagnostics = {
                selected_model: 'doubao-asr-speech2text',
                selected_model_note: 'AI Hub exported canvas selector for 豆包语音识别',
                audio_source: 'url',
                audio_format: format,
                language: normalizedLanguage
              };

              return {
                audio_url: url,
                audio_format: format,
                language: normalizedLanguage,
                diagnostics: JSON.stringify(diagnostics, null, 2)
              };
            }
          code_language: javascript
          desc: 校验音频 URL，并规范音频格式、识别语言和诊断信息。
          outputs:
            audio_format:
              children: null
              type: string
            audio_url:
              children: null
              type: string
            diagnostics:
              children: null
              type: string
            language:
              children: null
              type: string
          selected: false
          title: 规范语音识别参数
          type: code
          variables:
            - value_selector:
