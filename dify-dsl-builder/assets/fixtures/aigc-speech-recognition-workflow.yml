        targetPosition: left
        type: custom
        width: 244
      - data:
          desc: 使用 AI Hub 语音识别组件和豆包语音识别将音频转成文本与分段时间轴。
          model_info:
            config_version: v1
            model_id: doubao-asr-speech2text
            model_name: 豆包语音识别
            provider: doubao
            provider_name: 豆包
          params:
            audio_file:
              type: constant
              value: null
            audio_format:
              type: constant
              value: mp3
            audio_source:
              type: constant
              value: url
            audio_url:
              type: variable
              value_selector:
                - normalize_asr_request
                - audio_url
            language:
              type: constant
              value: ''
          selected: false
          title: 识别音频文本
          type: speech-recognition
        height: 220
        id: recognize_audio
        position:
          x: 700
          y: 260
        positionAbsolute:
          x: 700
          y: 260
        selected: false
        sourcePosition: right
        targetPosition: left
        type: custom
        width: 244
      - data:
          code: |
            function safeString(value) {
              if (value === null || value === undefined) {
                return '';
              }
              if (typeof value === 'string') {
                return value;
              }
              return String(value);
            }

            function normalizeUtterances(value) {
              if (Array.isArray(value)) {
                return value;
              }
              if (value === null || value === undefined || value === '') {
                return [];
              }
              if (typeof value === 'string') {
                try {
                  const parsed = JSON.parse(value);
                  return Array.isArray(parsed) ? parsed : [];
                } catch (error) {
                  return [];
                }
              }
              return [];
            }

            function main({text, duration, utterances, diagnostics, audio_url, audio_format, language}) {
              const transcriptText = safeString(text).trim();
              const timeline = normalizeUtterances(utterances);
              if (!transcriptText && timeline.length === 0) {
                throw new Error('speech-recognition returned no text or utterances');
              }

              const transcriptPackage = {
                transcript_text: transcriptText,
                duration: String(duration || ''),
                utterances: timeline,
                audio_url,
                audio_format,
                language,
                diagnostics_json: diagnostics
              };

              return {
                transcript_text: transcriptText,
                status: 'success',
                message: 'Audio recognized by AI Hub speech-recognition component with 豆包语音识别',
                duration: String(duration || ''),
                utterances_json: JSON.stringify(timeline, null, 2),
                transcript_package_json: JSON.stringify(transcriptPackage, null, 2),
                raw_response_json: JSON.stringify({text: transcriptText, duration, utterances: timeline}, null, 2)
              };
            }
          code_language: javascript
          desc: 整理识别结果，把分段时间轴序列化为字符串，避免下游 LLM 直接引用 array[object]。
          outputs:
            duration:
              children: null
              type: string
            message:
              children: null
              type: string
            raw_response_json:
              children: null
              type: string
            status:
              children: null
              type: string
            transcript_package_json:
              children: null
              type: string
            transcript_text:
              children: null
              type: string
            utterances_json:
              children: null
              type: string
          selected: false
          title: 整理语音识别输出
          type: code
          variables:
            - value_selector:
                - recognize_audio
                - text
              value_type: string
              variable: text
            - value_selector:
                - recognize_audio
                - duration
              value_type: number
              variable: duration
            - value_selector:
                - recognize_audio
                - utterances
              value_type: array[object]
              variable: utterances
            - value_selector:
                - normalize_asr_request
                - diagnostics
              value_type: string
              variable: diagnostics
            - value_selector:
                - normalize_asr_request
                - audio_url
              value_type: string
              variable: audio_url
            - value_selector:
                - normalize_asr_request
                - audio_format
              value_type: string
              variable: audio_format
            - value_selector:
                - normalize_asr_request
                - language
              value_type: string
              variable: language
        height: 260
        id: normalize_asr_output
        position:
          x: 1010
          y: 260
        positionAbsolute:
          x: 1010
          y: 260
        selected: false
        sourcePosition: right
        targetPosition: left
        type: custom
        width: 244
      - data:
          desc: ''
          outputs:
