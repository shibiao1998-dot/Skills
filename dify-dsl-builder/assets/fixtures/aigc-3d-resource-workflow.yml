          completion_params:
            json_schema: "{\n  \"type\": \"object\",\n  \"properties\": {\n    \"asset_name\": {\n      \"type\": \"string\"\
              ,\n      \"description\": \"3D 资产名称，简短明确\"\n    },\n    \"generation_mode\": {\n      \"type\": \"string\",\n\
              \      \"enum\": [\"text_to_3d\", \"image_to_3d\"],\n      \"description\": \"生成模式\"\n    },\n    \"generation_prompt\"\
              : {\n      \"type\": \"string\",\n      \"description\": \"用于 3D 模型生成的完整提示词，包含主体、比例、结构、拓扑、材质、纹理、PBR、视角和用途\"\n\
              \    },\n    \"negative_prompt\": {\n      \"type\": \"string\",\n      \"description\": \"需要避免的建模问题，例如破面、穿插、低清纹理、错误比例、噪声几何\"\
              \n    },\n    \"output_format\": {\n      \"type\": \"string\",\n      \"enum\": [\"GLB\", \"OBJ\", \"FBX\"\
              , \"USDZ\"],\n      \"description\": \"目标模型文件格式\"\n    },\n    \"pbr_enabled\": {\n      \"type\": \"string\"\
              ,\n      \"enum\": [\"true\", \"false\"],\n      \"description\": \"是否要求 PBR 材质\"\n    },\n    \"white_model\"\
              : {\n      \"type\": \"string\",\n      \"enum\": [\"true\", \"false\"],\n      \"description\": \"是否只生成几何白模\"\
              \n    },\n    \"asset_spec_json\": {\n      \"type\": \"string\",\n      \"description\": \"JSON 字符串，描述资产用途、尺寸比例、材质、拓扑要求、多视图要求和验收标准\"\
              \n    },\n    \"quality_checklist\": {\n      \"type\": \"string\",\n      \"description\": \"3D 资源生成后的质量检查清单\"\
              \n    }\n  },\n  \"required\": [\n    \"asset_name\",\n    \"generation_mode\",\n    \"generation_prompt\",\n\
              \    \"negative_prompt\",\n    \"output_format\",\n    \"pbr_enabled\",\n    \"white_model\",\n    \"asset_spec_json\"\
              ,\n    \"quality_checklist\"\n  ],\n  \"additionalProperties\": false\n}\n"
            max_completion_tokens: 4096
            response_format: json_schema
            temperature: 0.25
          mode: chat
          name: gpt-5.5-2026-04-24
          provider: aict/ai_hub/ai_hub
        prompt_template:
        - id: system-prompt
          role: system
          text: '你是一个资深 3D 资产技术美术和 Dify 工作流参数设计师。


            你的任务是把用户的 3D 资产需求转成可以直接传给 AI Hub 3D 模型生成组件的结构化参数。输出必须严格符合 JSON Schema。


            质量要求：

            - generation_prompt 必须包含主体、结构比例、关键造型、材质、纹理、拓扑、PBR、多视图/视角和用途。

            - 如果用户提供参考图或 generation_mode 为 image_to_3d，要强调保持参考图主体结构和轮廓一致。

            - 如果用户没有给出风格，默认选择高质量写实/半写实资产描述，不要使用“好看”“高级”等空泛词。

            - asset_spec_json 必须是 JSON 字符串，不是对象，便于下游 Code 和 End 节点直接传递。

            - 不要输出版权敏感 IP、品牌、艺术家或影视角色名称；用描述性造型语言替代。

            '
        - id: user-prompt
          role: user
          text: '请基于以下输入生成 3D 资源生产参数。


            【资产需求】

            {{#start.asset_brief#}}


            【用户期望】

            - 生成模式：{{#start.generation_mode#}}；如果为空，参考图 URL 不为空时使用 image_to_3d，否则使用 text_to_3d。

            - 参考图 URL：{{#start.reference_image_url#}}

            - 输出格式：{{#start.output_format#}}；如果为空，默认 GLB。

            - 视觉风格：{{#start.visual_style#}}；如果为空，默认写实、PBR 材质、可用于游戏/课程/展示资产。

            - 使用场景：{{#start.usage_context#}}；如果为空，默认可在 Web/教学/展示场景中复用。


            输出 JSON Schema 字段说明：

            - generation_prompt：传给 3D 生成组件的核心提示词。

            - asset_spec_json：资产规格 JSON 字符串。

            - quality_checklist：用于判断 3D 输出是否合格的检查清单。

            '
        structured_output:
          schema:
            type: object
            properties:
              asset_name:
