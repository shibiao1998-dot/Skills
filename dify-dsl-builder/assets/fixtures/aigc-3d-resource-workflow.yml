    - data:
        code: "function toArray(value) {\n  if (Array.isArray(value)) {\n    return value;\n  }\n  if (value === null || value\
          \ === undefined || value === '') {\n    return [];\n  }\n  return [value];\n}\n\nfunction firstUrlFrom(items) {\n\
          \  for (const item of items) {\n    if (typeof item === 'string' && item.trim()) {\n      return item.trim();\n\
          \    }\n    if (item && typeof item === 'object') {\n      const url = item.remote_url || item.url || item.download_url\
          \ || item.preview_url || item.model_url || '';\n      if (String(url).trim()) {\n        return String(url).trim();\n\
          \      }\n    }\n  }\n  return '';\n}\n\nfunction main({models, asset_name, asset_spec_json, diagnostics,\
          \ output_format, generation_prompt}) {\n  const allResources = toArray(models);\n  const modelUrl = firstUrlFrom(allResources);\n  if (!modelUrl) {\n    throw new\
          \ Error('model-3d-generation returned no usable model URL');\n  }\n\n  const assetPackage = {\n    asset_name,\n\
          \    model_url: modelUrl,\n    output_format,\n    generation_prompt,\n    asset_spec_json,\n    diagnostics_json:\
          \ diagnostics\n  };\n\n  return {\n    model_url: modelUrl,\n    status: 'success',\n    message: '3D resource generated\
          \ by AI Hub model-3d-generation component',\n    output_format: String(output_format || ''),\n    asset_package_json:\
          \ JSON.stringify(assetPackage, null, 2),\n    raw_response_json: JSON.stringify({resources: allResources}, null,\
          \ 2)\n  };\n}\n"
