    - data:
        code: "function extractStructured(value) {\n  if (value === null || value === undefined) {\n    return {};\n  }\n\
          \  if (typeof value === 'object') {\n    return value;\n  }\n  if (typeof value === 'string') {\n    try {\n   \
          \   return JSON.parse(value);\n    } catch (error) {\n      return {};\n    }\n  }\n  return {};\n}\n\nfunction\
          \ normalizeGenerationMode(requestedMode, referenceImageUrl, plannedMode) {\n  const allowed = new Set(['text_to_3d',\
          \ 'image_to_3d']);\n  const explicit = String(requestedMode || '').trim();\n  if (allowed.has(explicit)) {\n   \
          \ return explicit;\n  }\n  const planned = String(plannedMode || '').trim();\n  if (allowed.has(planned)) {\n  \
          \  return planned;\n  }\n  return String(referenceImageUrl || '').trim() ? 'image_to_3d' : 'text_to_3d';\n}\n\n\
          function normalizeOutputFormat(value, whiteModel) {\n  const allowed = new Set(['GLB', 'OBJ', 'FBX', 'USDZ']);\n\
          \  const normalized = String(value || '').trim().toUpperCase();\n  const selected = allowed.has(normalized) ? normalized\
          \ : 'GLB';\n  if (whiteModel === 'true' && selected === 'OBJ') {\n    return 'GLB';\n  }\n  return selected;\n}\n\
          \nfunction normalizeBooleanString(value, fallback) {\n  const normalized = String(value || '').trim().toLowerCase();\n\
          \  if (normalized === 'true' || normalized === 'false') {\n    return normalized;\n  }\n  return fallback;\n}\n\n\
          function main({planned_asset_name, planned_generation_mode, planned_generation_prompt, planned_negative_prompt,\
          \ planned_output_format, planned_pbr_enabled, planned_white_model, planned_asset_spec_json, planned_quality_checklist,\
          \ asset_brief, generation_mode, reference_image_url, output_format}) {\n  const data = {\n    asset_name: planned_asset_name,\n\
          \    generation_mode: planned_generation_mode,\n    generation_prompt: planned_generation_prompt,\n    negative_prompt:\
          \ planned_negative_prompt,\n    output_format: planned_output_format,\n    pbr_enabled: planned_pbr_enabled,\n \
          \   white_model: planned_white_model,\n    asset_spec_json: planned_asset_spec_json,\n    quality_checklist: planned_quality_checklist\n\
          \  };\n  const imageUrl = String(reference_image_url || '').trim();\n  const mode = normalizeGenerationMode(generation_mode,\
          \ imageUrl, data.generation_mode);\n  if (!asset_brief || !String(asset_brief).trim()) {\n    throw new Error('asset_brief\
          \ is required');\n  }\n  if (mode === 'image_to_3d' && !imageUrl) {\n    throw new Error('reference_image_url is\
          \ required when generation_mode is image_to_3d');\n  }\n\n  const issues = [];\n  let prompt = String(data.generation_prompt\
          \ || '').trim();\n  if (!prompt) {\n    const brief = String(asset_brief || '3D 资源').trim();\n    prompt = [\n \
          \     '为 AI Hub 3D 资源生成任务编写生产级提示词。',\n      '资源需求：' + brief.slice(0, 600),\n      '建模要求：主体结构清晰，比例合理，细节适中，适合后续业务复用。',\n\
          \      mode === 'image_to_3d' ? '需要参考输入图片保持主要外观特征。' : '根据文本描述生成完整 3D 资产。'\n    ].join('\\n');\n    issues.push('planner_generation_prompt_missing_used_fallback');\n\
          \  }\n\n  const whiteModel = normalizeBooleanString(data.white_model, 'false');\n  const pbrEnabled = whiteModel\
          \ === 'true' ? 'false' : normalizeBooleanString(data.pbr_enabled, 'true');\n  const format = normalizeOutputFormat(output_format\
          \ || data.output_format, whiteModel);\n  const assetSpecJson = String(data.asset_spec_json || '{}');\n  const diagnostics\
          \ = {\n    status: issues.length ? 'fallback' : 'success',\n    issues,\n    selected_model: 'hunyuan-3d-3.1-pro-text',\n\
          \    selected_model_note: 'AI Hub direct AIGC component model_info.model_id uses selector id hunyuan-3d-3.1-pro-text exported from the 文生3D模型 tab',\n\
          \    selected_generation_mode: mode,\n    selected_output_format: format,\n    pbr_enabled: pbrEnabled,\n    white_model:\
          \ whiteModel,\n    quality_checklist: data.quality_checklist || ''\n  };\n\n  return {\n    asset_name: String(data.asset_name\
          \ || '3D asset'),\n    generation_mode: mode,\n    generation_prompt: prompt,\n    negative_prompt: String(data.negative_prompt\
          \ || ''),\n    reference_image_url: imageUrl,\n    output_format: format,\n    pbr_enabled: pbrEnabled,\n    white_model:\
          \ whiteModel,\n    asset_spec_json: assetSpecJson,\n    diagnostics: JSON.stringify(diagnostics, null, 2)\n  };\n\
          }\n"
        code_language: javascript
        desc: 规范 LLM 输出，校验图生 3D 的参考图 URL，统一输出格式和诊断信息。
