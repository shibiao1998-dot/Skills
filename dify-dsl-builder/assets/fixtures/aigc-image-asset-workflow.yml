    - data:
        code: |
          const SIZE_MAP = {
            square: '1024x1024',
            '1:1': '1024x1024',
            landscape: '1536x1024',
            '4:3': '1536x1024',
            portrait: '1024x1536',
            '3:4': '1024x1536',
            wide: '1536x1024',
            '16:9': '1536x1024',
            '9:16': '1024x1536',
            auto: 'auto'
          };

          function normalizeToken(value) {
            const raw = String(value || '').trim().toLowerCase().replace('：', ':');
            if (!raw) {
              return '';
            }
            if (SIZE_MAP[raw]) {
              return SIZE_MAP[raw];
            }
            if (/^\d{3,4}x\d{3,4}$/.test(raw)) {
              return raw;
            }
            return '';
          }

          function inferSizeFromBrief(imageBrief, outputUse) {
            const text = [imageBrief, outputUse].map(value => String(value || '').toLowerCase()).join(' ');
            const normalized = text.replace(/：/g, ':');
            if (/(^|[^0-9])9\s*:\s*16([^0-9]|$)/.test(normalized) || /竖屏|竖版|抖音|快手|reels|story|stories/.test(normalized)) {
              return '1024x1536';
            }
            if (/(^|[^0-9])1\s*:\s*1([^0-9]|$)/.test(normalized) || /方图|正方形|头像|logo/.test(normalized)) {
              return '1024x1024';
            }
            if (/(^|[^0-9])3\s*:\s*4([^0-9]|$)/.test(normalized)) {
              return '1024x1536';
            }
            if (/(^|[^0-9])(16\s*:\s*9|4\s*:\s*3)([^0-9]|$)/.test(normalized) || /横版|封面|课件|投屏|ppt|keynote|海报横版/.test(normalized)) {
              return '1536x1024';
            }
            return '';
          }

          function normalizeSize(planned, requested, imageBrief, outputUse) {
            const requestedSize = normalizeToken(requested);
            if (requestedSize && requestedSize !== 'auto') {
              return {size: requestedSize, source: 'explicit'};
            }
            const plannedSize = normalizeToken(planned);
            if (plannedSize && plannedSize !== 'auto') {
              return {size: plannedSize, source: 'planned'};
            }
            const inferredSize = inferSizeFromBrief(imageBrief, outputUse);
            if (inferredSize) {
              return {size: inferredSize, source: 'brief_inferred'};
            }
            return {size: 'auto', source: requestedSize === 'auto' ? 'explicit_auto' : 'auto'};
          }

          function normalizeImageCount(value) {
            const parsed = Number(value || 1);
            if (!Number.isFinite(parsed)) {
              return 1;
            }
            return Math.max(1, Math.min(4, Math.round(parsed)));
          }

          function normalizeFormat(value) {
            const normalized = String(value || '').trim().toLowerCase();
            return ['png', 'jpeg', 'webp'].includes(normalized) ? normalized : 'png';
          }

          function main({planned_image_prompt, planned_size, planned_output_format, planned_image_count, planned_background, planned_quality_notes, planned_quality_checklist, image_brief, output_use, aspect_size, image_count, output_format}) {
            const issues = [];
            let prompt = String(planned_image_prompt || '').trim();
            if (!prompt) {
              const brief = String(image_brief || output_use || '业务图片资产').trim();
              prompt = [
                '为 AI Hub 图片生成任务编写高质量中文提示词。',
                '主体和用途：' + brief.slice(0, 600),
                '要求：主体清晰，构图完整，风格稳定，适合生产级复用，无文字水印。'
              ].join('\n');
              issues.push('planner_image_prompt_missing_used_fallback');
            }

            const sizeDecision = normalizeSize(planned_size, aspect_size, image_brief, output_use);
            const size = sizeDecision.size;
            const count = normalizeImageCount(image_count || planned_image_count);
            const format = normalizeFormat(output_format || planned_output_format);
            const background = String(planned_background || 'auto').trim();
            const diagnostics = {
              status: issues.length ? 'fallback' : 'success',
              issues,
              selected_model: 'gpt-image-2-t2i',
              selected_model_note: 'AI Hub direct image-generation component model_info.model_id uses the canvas selector id gpt-image-2-t2i; LLM nodes use detail-card 模型版本 strings separately',
              output_use: String(output_use || ''),
              source_brief_length: String(image_brief || '').length,
              size,
              size_source: sizeDecision.source,
              image_count: count,
              output_format: format,
              background,
              quality_notes: planned_quality_notes || '',
              quality_checklist: planned_quality_checklist || ''
            };

            return {
              image_prompt: prompt,
              size,
              image_count: count,
              output_format: format,
              background,
              quality_checklist: String(planned_quality_checklist || ''),
              diagnostics: JSON.stringify(diagnostics, null, 2)
            };
          }
        code_language: javascript
        desc: 规范 GPT Image 2 参数，校验提示词、尺寸、数量、格式和诊断信息。
