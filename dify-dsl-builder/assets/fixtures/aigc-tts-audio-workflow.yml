    - data:
        code: |
          function toArray(value) {
            if (Array.isArray(value)) {
              return value;
            }
            if (value === null || value === undefined || value === '') {
              return [];
            }
            return [value];
          }

          function firstAudio(items) {
            for (const item of items) {
              if (typeof item === 'string' && item.trim()) {
                return {audio_url: item.trim()};
              }
              if (item && typeof item === 'object') {
                const audioUrl = item.remote_url || item.url || item.download_url || item.audio_url || item.preview_url || (item.extra && item.extra.source_url) || '';
                if (String(audioUrl).trim()) {
                  return {
                    audio_url: String(audioUrl).trim(),
                    duration: String(item.duration || item.audio_duration || (item.extra && item.extra.duration) || ''),
                    sample_rate: String(item.sample_rate || (item.extra && item.extra.sample_rate) || ''),
                    mime_type: String(item.mime_type || item.content_type || '')
                  };
                }
              }
            }
            return {audio_url: ''};
          }

          function main({audios, tts_text, speaker, diagnostics, output_format}) {
            const allAudios = toArray(audios);
            const audio = firstAudio(allAudios);
            if (!audio.audio_url) {
              throw new Error('audio-generation returned no usable audio_url');
            }

            const audioPackage = {
              audio_url: audio.audio_url,
              duration: audio.duration || '',
              sample_rate: audio.sample_rate || '',
              mime_type: audio.mime_type || (output_format === 'wav' ? 'audio/wav' : 'audio/mpeg'),
              speaker,
              tts_text,
              diagnostics_json: diagnostics
            };

            return {
              audio_url: audio.audio_url,
              status: 'success',
              message: 'TTS audio generated by AI Hub audio-generation component',
              duration: audio.duration || '',
              sample_rate: audio.sample_rate || '',
              mime_type: audioPackage.mime_type,
              audio_package_json: JSON.stringify(audioPackage, null, 2),
              raw_response_json: JSON.stringify({audios: allAudios}, null, 2)
            };
          }
        code_language: javascript
        desc: 提取音频 URL，并整理 End 节点需要返回的音频元数据和原始响应。
