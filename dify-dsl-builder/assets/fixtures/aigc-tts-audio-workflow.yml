    - data:
        code: "function normalizeSpeechRate(value) {\n  const parsed = Number(value || 1);\n  if (!Number.isFinite(parsed)) {\n    return 1;\n  }\n  return Math.max(0.5, Math.min(2, Number(parsed.toFixed(2))));\n}\n\nfunction normalizeFormat(value) {\n  const normalized = String(value || '').trim().toLowerCase();\n  return normalized === 'wav' ? 'wav' : 'mp3';\n}\n\n\nfunction normalizeSpeaker(value) {\n  const raw = String(value || '').trim();\n  if (!raw) {\n    return 'zh_female_xueayi_saturn_bigtts';\n  }\n  if (/^[a-z]{2}_[a-z]+_[a-z0-9_]+_bigtts$/i.test(raw)) {\n    return raw;\n  }\n  return 'zh_female_xueayi_saturn_bigtts';\n}\n\nfunction normalizeEmotionTips(value) {\n  if (typeof value === 'string' && value.trim()) {\n    try {\n      const parsed = JSON.parse(value);\n      if (Array.isArray(parsed)) {\n        return JSON.stringify(parsed.map(String), null, 2);\n      }\n    } catch (error) {\n      return JSON.stringify([value.trim()], null, 2);\n    }\n  }\n  return JSON.stringify(['自然清晰',\
          \ '语气亲切', '关键词稍微放慢'], null, 2);\n}\n\nfunction main({planned_tts_text, planned_speaker, planned_speech_rate, planned_output_format, planned_emotion_tips_json, planned_quality_checklist, narration_text, speaker, speech_rate, output_format}) {\n  const text = String(planned_tts_text || narration_text || '').trim();\n  if (!text) {\n    throw new Error('narration_text is required');\n  }\n  if (text.length > 900) {\n    throw new Error('tts_text is too long; split text with an iteration-based batch TTS workflow');\n  }\n\n  const selectedSpeaker = normalizeSpeaker(speaker || planned_speaker);\n  const selectedFormat = normalizeFormat(output_format || planned_output_format);\n  const selectedRate = normalizeSpeechRate(speech_rate || planned_speech_rate);\n  const emotionTips = normalizeEmotionTips(planned_emotion_tips_json);\n  const diagnostics = {\n    selected_model: 'seed-tts-2.0',\n    selected_model_note: 'AI Hub direct AIGC component model_info.model_id uses selector id seed-tts-2.0',\n\
          \    text_length: text.length,\n    selected_speaker: selectedSpeaker,\n    selected_format: selectedFormat,\n    selected_speech_rate: selectedRate,\n    quality_checklist: planned_quality_checklist || ''\n  };\n\n  return {\n    tts_text: text,\n    speaker: selectedSpeaker,\n    speech_rate: selectedRate,\n    output_format: selectedFormat,\n    emotion_tips_json: emotionTips,\n    diagnostics: JSON.stringify(diagnostics, null, 2)\n  };\n}\n"
        code_language: javascript
