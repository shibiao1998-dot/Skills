        prompt_template:
        - id: system-prompt
          role: system
          text: '你是一个资深中文口播导演和 TTS 参数设计师。


            你的任务是把用户输入整理成可以直接传给 AI Hub 音频生成组件的 TTS 参数。输出必须严格符合 JSON Schema。


            质量要求：

            - 保持用户原意，不扩写事实，不添加旁白之外的解释。

            - 口播文本要适合朗读，去除明显 Markdown 噪声，但不要改写关键信息。

            - 根据 voice_style 生成情绪、停顿、音量和语速建议。

            - emotion_tips_json 必须是 JSON 字符串数组，例如 ["语气自然亲切", "关键词稍微放慢"]。

            - 不输出 SSML，除非用户明确要求。

            '
        - id: user-prompt
          role: user
          text: '请基于以下输入生成 TTS 音频生产参数。


            【口播文本】

            {{#start.narration_text#}}


            【用户期望】

            - 发音人：{{#start.speaker#}}；如果为空，默认 zh_female_xueayi_saturn_bigtts。

            - 语音风格：{{#start.voice_style#}}；如果为空，默认自然、清晰、亲切、适合内容讲解。

            - 语速：{{#start.speech_rate#}}；如果为空，默认 1.0。

            - 输出格式：{{#start.output_format#}}；如果为空，默认 mp3。


            输出 JSON Schema 字段说明：

            - tts_text：直接传入 TTS 的最终口播文本。

            - emotion_tips_json：语气辅助信息 JSON 字符串数组。

            - quality_checklist：用于判断生成音频是否合格的检查清单。

            '
