    - data:
        code: "function toArray(value) {\n  if (Array.isArray(value)) {\n    return\
          \ value;\n  }\n  if (value === null || value === undefined || value ===\
          \ '') {\n    return [];\n  }\n  return [value];\n}\n\nfunction firstAudio(items)\
          \ {\n  for (const item of items) {\n    if (typeof item === 'string' &&\
          \ item.trim()) {\n      return {audio_url: item.trim()};\n    }\n    if\
          \ (item && typeof item === 'object') {\n      const audioUrl = item.remote_url\
          \ || item.url || item.download_url || item.audio_url || item.stream_url\
          \ || '';\n      if (String(audioUrl).trim()) {\n        return {\n     \
          \     audio_url: String(audioUrl).trim(),\n          stream_url: String(item.stream_url\
          \ || item.remote_url || item.url || ''),\n          duration: String(item.duration\
          \ || item.audio_duration || ''),\n          title: String(item.title ||\
          \ item.filename || '')\n        };\n      }\n    }\n  }\n  return {audio_url:\
          \ ''};\n}\n\nfunction main({audios, prompt, title, style, instrumental,\
          \ diagnostics}) {\n  const allAudios = toArray(audios);\n  const audio =\
          \ firstAudio(allAudios);\n  if (!audio.audio_url) {\n    throw new Error('audio-generation\
          \ returned no usable audio_url for music audio');\n  }\n  const musicPackage\
          \ = {\n    audio_url: audio.audio_url,\n    stream_url: audio.stream_url\
          \ || '',\n    duration: audio.duration || '',\n    title: audio.title ||\
          \ title,\n    style,\n    instrumental,\n    prompt,\n    diagnostics_json:\
          \ diagnostics\n  };\n  return {\n    audio_url: audio.audio_url,\n    stream_url:\
          \ audio.stream_url || '',\n    status: 'success',\n    message: 'Music audio\
          \ generated by AI Hub audio-generation component with Suno V5',\n    duration:\
          \ audio.duration || '',\n    title: audio.title || title,\n    music_package_json:\
          \ JSON.stringify(musicPackage, null, 2),\n    raw_response_json: JSON.stringify({audios:\
          \ allAudios}, null, 2)\n  };\n}\n"
        code_language: javascript
        desc: 提取音频 URL，并整理 End 节点需要返回的音乐资产包和原始响应。
