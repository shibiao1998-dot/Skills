        model:
          completion_params:
            json_schema: "{\n  \"type\": \"object\",\n  \"properties\": {\n    \"\
              prompt\": {\n      \"type\": \"string\",\n      \"description\": \"\
              传给音乐生成模型的歌词、纯音乐创作说明或完整音乐提示词\"\n    },\n    \"instrumental\": {\n   \
              \   \"type\": \"string\",\n      \"enum\": [\n        \"true\",\n  \
              \      \"false\"\n      ],\n      \"description\": \"是否生成纯音乐；BGM、配乐、背景音乐场景使用\
              \ true\"\n    },\n    \"title\": {\n      \"type\": \"string\",\n  \
              \    \"description\": \"音乐标题，短而清楚，不使用版权曲名或真实艺人名\"\n    },\n    \"style\"\
              : {\n      \"type\": \"string\",\n      \"description\": \"英文逗号分隔的音乐风格、情绪、速度、乐器、人声和制作质量要求\"\
              \n    },\n    \"negativeTags\": {\n      \"type\": \"string\",\n   \
              \   \"description\": \"英文逗号分隔的反向风格和质量排除项\"\n    },\n    \"vocalGender\"\
              : {\n      \"type\": \"string\",\n      \"enum\": [\n        \"男\",\n\
              \        \"女\"\n      ],\n      \"description\": \"需要人声时的人声性别；纯音乐场景保留默认值即可\"\
              \n    },\n    \"styleWeight\": {\n      \"type\": \"number\",\n    \
              \  \"description\": \"风格遵循强度，范围 0 到 1\"\n    },\n    \"weirdnessConstraint\"\
              : {\n      \"type\": \"number\",\n      \"description\": \"新奇程度约束，范围\
              \ 0 到 1，生产默认保持较低\"\n    },\n    \"audioWeight\": {\n      \"type\":\
              \ \"number\",\n      \"description\": \"音频整体生成权重，范围 0 到 1\"\n    },\n\
              \    \"quality_checklist\": {\n      \"type\": \"string\",\n      \"\
              description\": \"面向业务验收的音乐质量检查清单\"\n    }\n  },\n  \"required\": [\n\
              \    \"prompt\",\n    \"instrumental\",\n    \"title\",\n    \"style\"\
              ,\n    \"negativeTags\",\n    \"vocalGender\",\n    \"styleWeight\"\
              ,\n    \"weirdnessConstraint\",\n    \"audioWeight\",\n    \"quality_checklist\"\
              \n  ],\n  \"additionalProperties\": false\n}"
            max_completion_tokens: 2048
            response_format: json_schema
            temperature: 0.2
          mode: chat
          name: gpt-5.5-2026-04-24
          provider: aict/ai_hub/ai_hub
        prompt_template:
        - id: system-prompt
          role: system
          text: 你是资深音乐制作人、Suno 提示词工程师和短视频 BGM 统筹。你的任务是把业务人员的音乐想法转成可执行的音乐生成参数。必须优先保证可听、可用、风格清楚，不要写版权曲名、艺人名或难以授权的具体仿作。
        - id: user-prompt
          role: user
          text: '请根据输入生成音乐音频参数。


            音乐需求：{{#start.music_brief#}}

            是否纯音乐：{{#start.instrumental_mode#}}

            用户提供歌词：{{#start.lyrics#}}

            用户指定风格：{{#start.music_style#}}

            用户指定标题：{{#start.title#}}

            期望人声：{{#start.vocal_gender#}}

            排除风格：{{#start.negative_style#}}


            要求：

            - 如果用户给了歌词，优先保留歌词并整理为可唱结构。

            - 如果用户要求 BGM、配乐、纯音乐、背景音乐，instrumental 输出 true。

            - 如果用户没有给歌词但明显想要歌曲，请生成短小、完整、可唱的中文歌词。

            - style 用英文逗号分隔，写清 genre, mood, tempo, instruments, vocal, production
            quality。

            - negativeTags 用英文逗号分隔，避免 low quality, off key, noisy vocal, distorted
            mix。

            - 不要使用真实歌手名、版权歌曲名、品牌音乐名。

            - quality_checklist 要让业务人员能判断第一次运行结果是否可用。

            - 输出必须严格符合 JSON Schema，只返回 JSON 对象，不输出 Markdown、解释或额外字段。'
