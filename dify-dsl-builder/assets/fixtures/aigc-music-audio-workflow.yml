    - data:
        code: "function cleanText(value, fallback, maxLength) {\n  const text = String(value\
          \ || '').trim();\n  const resolved = text || fallback;\n  return resolved.length\
          \ > maxLength ? resolved.slice(0, maxLength) : resolved;\n}\n\nfunction\
          \ clampNumber(value, fallback, min, max) {\n  const num = Number(value);\n\
          \  if (!Number.isFinite(num)) {\n    return fallback;\n  }\n  return Math.min(max,\
          \ Math.max(min, num));\n}\n\nfunction normalizeBooleanText(value, fallback)\
          \ {\n  const text = String(value || '').trim().toLowerCase();\n  if (text\
          \ === 'true' || text === 'false') {\n    return text;\n  }\n  return fallback;\n\
          }\n\nfunction inferInstrumental(mode, brief, lyrics, planned) {\n  const\
          \ explicit = normalizeBooleanText(mode, '');\n  if (explicit) {\n    return\
          \ explicit;\n  }\n  const plan = normalizeBooleanText(planned, '');\n  if\
          \ (plan) {\n    return plan;\n  }\n  const combined = `${brief || ''} ${lyrics\
          \ || ''}`.toLowerCase();\n  return /纯音乐|bgm|背景音乐|配乐|instrumental|no vocal|无歌词/.test(combined)\
          \ ? 'true' : 'false';\n}\n\nfunction normalizeGender(value, instrumental)\
          \ {\n  if (instrumental === 'true') {\n    return '';\n  }\n  const text\
          \ = String(value || '').trim().toLowerCase();\n  if (['m', 'male', '男',\
          \ '男声', '男性'].includes(text)) {\n    return 'm';\n  }\n  if (['f', 'female',\
          \ '女', '女声', '女性'].includes(text)) {\n    return 'f';\n  }\n  return 'f';\n\
          }\n\nfunction main({planned_prompt, planned_instrumental,\
          \ planned_title, planned_style, planned_negative_tags, planned_vocal_gender,\
          \ planned_style_weight, planned_weirdness_constraint, planned_audio_weight,\
          \ planned_quality_checklist, music_brief, instrumental_mode, lyrics, music_style,\
          \ title, vocal_gender, negative_style}) {\n  const sourceBrief = cleanText(music_brief,\
          \ '生成一段适合业务使用的高质量背景音乐。', 2000);\n  const instrumental = inferInstrumental(instrumental_mode,\
          \ sourceBrief, lyrics, planned_instrumental);\n  const promptFallback = instrumental ===\
          \ 'true'\n    ? `${sourceBrief}\\nCreate a polished instrumental track with\
          \ clear structure and usable intro, development, and ending.`\n    : `${lyrics\
          \ || sourceBrief}\\nCreate a short, singable Chinese song with clear verse\
          \ and chorus.`;\n  const prompt = cleanText(lyrics || planned_prompt, promptFallback,\
          \ 3000);\n  const selectedTitle = cleanText(title || planned_title, 'AI\
          \ Hub Music', 60);\n  const selectedStyle = cleanText(music_style || planned_style,\
          \ 'cinematic, warm, melodic, polished production, clear mix', 220);\n  const\
          \ negativeTags = cleanText(negative_style || planned_negative_tags, 'low\
          \ quality, noisy vocal, off key, off tempo, distorted mix, excessive reverb',\
          \ 180);\n  const selectedGender = normalizeGender(vocal_gender || planned_vocal_gender,\
          \ instrumental);\n  const styleWeight = clampNumber(planned_style_weight,\
          \ 0.9, 0, 1);\n  const weirdnessConstraint = clampNumber(planned_weirdness_constraint,\
          \ 0.2, 0, 1);\n  const audioWeight = clampNumber(planned_audio_weight, 0.7,\
          \ 0, 1);\n  const qualityChecklist = cleanText(planned_quality_checklist,\
          \ '1. 音乐结构完整，有清楚开头、发展和收束。\\n2. 风格与使用场景一致。\\n3. 人声或主旋律清晰，无明显跑调、爆音或节奏错乱。\\\
          n4. 可直接用于首轮业务验收。', 1500);\n  const diagnostics = {\n    selected_model:\
          \ 'suno-v5-music_generate',\n    selected_model_note: 'AI Hub direct audio-generation\
          \ component model_info.model_id uses exported canvas selector id suno-v5-music_generate',\n\
          \    instrumental,\n    prompt_length: prompt.length,\n    style: selectedStyle,\n\
          \    negativeTags,\n    vocalGender: selectedGender,\n    styleWeight,\n\
          \    weirdnessConstraint,\n    audioWeight,\n    quality_checklist: qualityChecklist\n\
          \  };\n  return {\n    prompt,\n    style: selectedStyle,\n    title: selectedTitle,\n\
          \    model: 'V5',\n    instrumental,\n\
          \    negativeTags,\n    vocalGender: selectedGender,\n    styleWeight,\n\
          \    weirdnessConstraint,\n    audioWeight,\n    quality_checklist: qualityChecklist,\n\
          \    diagnostics: JSON.stringify(diagnostics, null, 2)\n  };\n}\n"
        code_language: javascript
        desc: 规范 Suno V5 参数，校验歌词/提示词、风格、标题、人声和权重。
